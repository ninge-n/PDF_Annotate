<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PDF テキスト追記ツール</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@cantoo/pdf-lib@2.7.1/dist/pdf-lib.min.js"></script>
<script src="https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.min.js"></script>
<style>
  /* 保存時にPDFへ埋め込むフォントと同じものを画面表示にも使う（折り返し位置を一致させるため） */
  @font-face{
    font-family:'MPLUS1p-PDF';
    src:url('https://raw.githubusercontent.com/google/fonts/main/ofl/mplus1p/MPLUS1p-Regular.ttf') format('truetype');
    font-display:swap;
  }
  :root{
    --bg:#1b1d22;
    --panel:#24262d;
    --line:#3a3d46;
    --text:#e7e8ec;
    --muted:#9a9dab;
    --accent:#5b8dee;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;
    background:var(--bg);
    color:var(--text);
    height:100vh;
    display:flex;
    flex-direction:column;
  }
  #toolbar{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 16px;
    background:var(--panel);
    border-bottom:1px solid var(--line);
    flex-wrap:wrap;
  }
  #toolbar button, #toolbar label.file-btn{
    background:#2f323c;
    color:var(--text);
    border:1px solid var(--line);
    border-radius:6px;
    padding:6px 12px;
    cursor:pointer;
    font-size:13px;
  }
  #toolbar button:hover, #toolbar label.file-btn:hover{ background:#383b46; }
  #toolbar button:disabled{ opacity:0.4; cursor:default; }
  #toolbar input[type=file]{ display:none; }
  #toolbar input[type=number]{
    width:56px;
    background:#2f323c;
    color:var(--text);
    border:1px solid var(--line);
    border-radius:6px;
    padding:5px;
  }
  #toolbar input[type=color]{
    width:34px;height:30px;border:1px solid var(--line);border-radius:6px;background:none;padding:0;cursor:pointer;
  }
  #save-btn{ background:var(--accent); border-color:var(--accent); margin-left:auto; }
  #page-info{ color:var(--muted); font-size:13px; min-width:80px; text-align:center;}
  #hint{ width:100%; font-size:12px; color:var(--muted); margin-top:2px; }
  #main{
    flex:1;
    overflow:auto;
    display:flex;
    justify-content:center;
    padding:24px;
  }
  #stage{
    position:relative;
    box-shadow:0 4px 24px rgba(0,0,0,0.5);
    background:#fff;
    line-height:0;
  }
  #pdf-canvas{ display:block; }
  #overlay{
    position:absolute;
    top:0;left:0;
    width:100%;height:100%;
  }
  .textbox{
    position:absolute;
    min-width:20px;
    min-height:1em;
    padding:2px 4px;
    border:1px dashed rgba(91,141,238,0.7);
    background:rgba(91,141,238,0.06);
    outline:none;
    white-space:pre-wrap;
    overflow-wrap:break-word;
    font-family:'MPLUS1p-PDF','Hiragino Sans','Yu Gothic',sans-serif;
    line-height:1.4;
    cursor:move;
    color:#111;
  }
  .textbox:focus-within{
    border:1px solid var(--accent);
    background:rgba(91,141,238,0.12);
    cursor:text;
  }
  .textbox .textcontent{
    outline:none;
    min-height:1em;
  }
  .textbox .del{
    position:absolute;
    top:-10px;right:-10px;
    width:18px;height:18px;
    border-radius:50%;
    background:#d9534f;
    color:#fff;
    font-size:12px;
    line-height:18px;
    text-align:center;
    cursor:pointer;
    display:none;
  }
  .textbox:hover .del{ display:block; }
  .textbox .handle{
    position:absolute;
    width:10px;height:10px;
    background:var(--accent);
    border:1px solid #fff;
    border-radius:2px;
    display:none;
  }
  .textbox:hover .handle, .textbox:focus-within .handle{ display:block; }
  .handle-e{ right:-6px; top:50%; margin-top:-5px; cursor:ew-resize; }
  .handle-s{ bottom:-6px; left:50%; margin-left:-5px; cursor:ns-resize; }
  .handle-se{ right:-6px; bottom:-6px; cursor:nwse-resize; }
  .measurebox{
    visibility:hidden;
    left:-10000px !important;
    top:0 !important;
  }
  #empty-state{
    color:var(--muted);
    margin:auto;
    text-align:center;
    font-size:14px;
  }
</style>
</head>
<body>

<div id="toolbar">
  <label class="file-btn">PDFを開く<input type="file" id="file-input" accept="application/pdf"></label>
  <button id="prev-btn" disabled>◀ 前へ</button>
  <span id="page-info">-</span>
  <button id="next-btn" disabled>次へ ▶</button>
  <button id="add-text-btn" disabled>＋ テキスト追加</button>
  <label style="font-size:13px;color:var(--muted);">サイズ<input type="number" id="font-size" value="16" min="6" max="96"></label>
  <input type="color" id="font-color" value="#000000" title="文字色">
  <button id="save-btn" disabled>PDFを保存</button>
  <div id="hint">キャンバス上をクリックするとその位置にテキストボックスが追加されます。ドラッグで移動、右・下・右下のハンドルでサイズ変更（テキストは自動で折り返し）、右上の×で削除できます。日本語フォント（M PLUS 1p, 約1.7MB）を読み込むため、初回表示・初回保存時のみ数秒かかります。</div>
</div>

<div id="main">
  <div id="empty-state">左上の「PDFを開く」からファイルを選択してください</div>
  <div id="stage" style="display:none;">
    <canvas id="pdf-canvas"></canvas>
    <div id="overlay"></div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const RENDER_SCALE = 1.6;
// .textbox の CSS と一致させること
const LINE_HEIGHT = 1.4;      // line-height
const BOX_PAD_X = 5;          // border 1px + padding-left 4px
const BOX_PAD_Y = 3;          // border 1px + padding-top 2px
// M PLUS 1p の hhea メトリクス（ブラウザが行ボックス内のベースライン位置に使う値）
const FONT_ASCENT = 1.075;
const FONT_DESCENT = 0.32;

let pdfDoc = null;          // pdf.js document
let originalBytes = null;   // 元のPDFバイナリ (ArrayBuffer)
let pdfPassword = '';       // 閲覧パスワード付きPDF用（開くときに入力されたものを保存時にも使う）
let currentPage = 1;
let numPages = 0;
let pageBoxes = {};         // { pageNumber: [ {id,x,y,text,fontSize,color} ] }
let boxIdCounter = 0;

const fileInput = document.getElementById('file-input');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');
const addTextBtn = document.getElementById('add-text-btn');
const saveBtn = document.getElementById('save-btn');
const pageInfo = document.getElementById('page-info');
const canvas = document.getElementById('pdf-canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const stage = document.getElementById('stage');
const emptyState = document.getElementById('empty-state');
const fontSizeInput = document.getElementById('font-size');
const fontColorInput = document.getElementById('font-color');

let addMode = false;

const JP_FONT_URL = "https://raw.githubusercontent.com/google/fonts/main/ofl/mplus1p/MPLUS1p-Regular.ttf";
let jpFontBytesCache = null;

async function getJpFontBytes() {
  if (jpFontBytesCache) return jpFontBytesCache;
  const res = await fetch(JP_FONT_URL);
  if (!res.ok) throw new Error("日本語フォントの取得に失敗しました");
  jpFontBytesCache = await res.arrayBuffer();
  return jpFontBytesCache;
}

fileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  originalBytes = await file.arrayBuffer();
  pdfPassword = '';
  // 閲覧パスワード付きPDFは入力を促し、正しいパスワードが入るまで再試行
  while (true) {
    try {
      const loadingTask = pdfjsLib.getDocument({ data: originalBytes.slice(0), password: pdfPassword });
      pdfDoc = await loadingTask.promise;
      break;
    } catch (err) {
      if (err && err.name === 'PasswordException') {
        const input = prompt(
          err.code === pdfjsLib.PasswordResponses.INCORRECT_PASSWORD
            ? 'パスワードが違います。もう一度入力してください:'
            : 'このPDFはパスワードで保護されています。パスワードを入力してください:'
        );
        if (input === null) return; // キャンセル
        pdfPassword = input;
      } else {
        alert('PDFを開けませんでした: ' + (err && err.message ? err.message : err));
        return;
      }
    }
  }
  numPages = pdfDoc.numPages;
  currentPage = 1;
  pageBoxes = {};
  boxIdCounter = 0;
  stage.style.display = 'block';
  emptyState.style.display = 'none';
  prevBtn.disabled = false;
  nextBtn.disabled = false;
  addTextBtn.disabled = false;
  saveBtn.disabled = false;
  await renderPage(currentPage);
});

async function renderPage(num) {
  const page = await pdfDoc.getPage(num);
  const viewport = page.getViewport({ scale: RENDER_SCALE });
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  overlay.style.width = viewport.width + 'px';
  overlay.style.height = viewport.height + 'px';
  await page.render({ canvasContext: ctx, viewport }).promise;
  pageInfo.textContent = `${num} / ${numPages}`;
  rebuildOverlay();
}

function rebuildOverlay() {
  overlay.innerHTML = '';
  const boxes = pageBoxes[currentPage] || [];
  boxes.forEach(box => overlay.appendChild(createBoxElement(box)));
}

// テキストボックスの編集領域(.textcontent)にフォーカスしてキャレットを置く。
// クリック座標があればその位置に、なければ末尾に置く
function focusTextbox(el, x, y) {
  const inner = el.querySelector('.textcontent');
  inner.focus();
  const sel = getSelection();
  let range = null;
  if (x !== undefined && document.caretRangeFromPoint) {
    const r = document.caretRangeFromPoint(x, y);
    if (r && inner.contains(r.startContainer)) range = r;
  }
  if (!range) {
    range = document.createRange();
    range.selectNodeContents(inner);
    range.collapse(false);
  }
  sel.removeAllRanges();
  sel.addRange(range);
}

function createBoxElement(box) {
  const el = document.createElement('div');
  el.className = 'textbox';
  el.style.left = box.x + 'px';
  el.style.top = box.y + 'px';
  el.style.width = box.w + 'px';
  el.style.minHeight = box.h + 'px';
  el.style.fontSize = box.fontSize + 'px';
  el.style.color = box.color;
  el.dataset.id = box.id;

  // 編集対象のテキストは内側の要素に分離する。×ボタンやハンドルを
  // contenteditable の中に置くと、テキスト取得時の混入や
  // 「キャレットが立たず入力できない」問題の原因になる
  const inner = document.createElement('div');
  inner.className = 'textcontent';
  inner.contentEditable = 'true';
  inner.textContent = box.text;
  el.appendChild(inner);
  inner.addEventListener('input', () => { box.text = inner.textContent; });

  const del = document.createElement('span');
  del.className = 'del';
  del.textContent = '×';
  del.addEventListener('click', (e) => {
    e.stopPropagation();
    const arr = pageBoxes[currentPage];
    pageBoxes[currentPage] = arr.filter(b => b.id !== box.id);
    el.remove();
  });
  el.appendChild(del);

  // ドラッグ移動。編集中はテキスト選択を優先し、
  // 動かさずにクリックだけした場合はその位置から編集を開始する
  let dragging = false, moved = false, startX, startY, origX, origY;
  el.addEventListener('mousedown', (e) => {
    if (e.target === del || e.target.classList.contains('handle')) return;
    if (document.activeElement === inner) return; // 文字選択優先
    dragging = true;
    moved = false;
    startX = e.clientX; startY = e.clientY;
    origX = box.x; origY = box.y;
    e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    if (Math.abs(e.clientX - startX) + Math.abs(e.clientY - startY) > 2) moved = true;
    box.x = origX + (e.clientX - startX);
    box.y = origY + (e.clientY - startY);
    el.style.left = box.x + 'px';
    el.style.top = box.y + 'px';
  });
  document.addEventListener('mouseup', (e) => {
    if (dragging && !moved) focusTextbox(el, e.clientX, e.clientY);
    dragging = false;
  });

  // リサイズハンドル（e:幅 s:高さ se:両方）
  for (const dir of ['e', 's', 'se']) {
    const handle = document.createElement('span');
    handle.className = 'handle handle-' + dir;
    handle.addEventListener('mousedown', (ev) => {
      ev.preventDefault();
      ev.stopPropagation();
      const sx = ev.clientX, sy = ev.clientY, w0 = box.w, h0 = box.h;
      const minH = Math.ceil(box.fontSize * LINE_HEIGHT) + BOX_PAD_Y * 2;
      const onMove = (e2) => {
        if (dir.includes('e')) box.w = Math.max(40, w0 + e2.clientX - sx);
        if (dir.includes('s')) box.h = Math.max(minH, h0 + e2.clientY - sy);
        el.style.width = box.w + 'px';
        el.style.minHeight = box.h + 'px';
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
    el.appendChild(handle);
  }

  return el;
}

addTextBtn.addEventListener('click', () => {
  addMode = !addMode;
  addTextBtn.style.background = addMode ? 'var(--accent)' : '';
  canvas.style.cursor = addMode ? 'crosshair' : 'default';
});

overlay.addEventListener('click', (e) => {
  if (!addMode || e.target !== overlay) return;
  const rect = overlay.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const fontSize = parseInt(fontSizeInput.value, 10) || 16;
  const box = {
    id: ++boxIdCounter,
    x, y,
    w: Math.min(240, Math.max(60, overlay.clientWidth - x - 10)),
    h: Math.ceil(fontSize * LINE_HEIGHT) + BOX_PAD_Y * 2,
    text: '',
    fontSize,
    color: fontColorInput.value
  };
  if (!pageBoxes[currentPage]) pageBoxes[currentPage] = [];
  pageBoxes[currentPage].push(box);
  const el = createBoxElement(box);
  overlay.appendChild(el);
  focusTextbox(el);
  addMode = false;
  addTextBtn.style.background = '';
  canvas.style.cursor = 'default';
});

prevBtn.addEventListener('click', async () => {
  if (currentPage <= 1) return;
  currentPage--;
  await renderPage(currentPage);
});
nextBtn.addEventListener('click', async () => {
  if (currentPage >= numPages) return;
  currentPage++;
  await renderPage(currentPage);
});

// 画面と同じスタイルの計測用要素でテキストを描画し、ブラウザが実際に
// 折り返した位置を Range API で読み取って行ごとの文字列に分割する。
// これをそのままPDFに1行ずつ描画するので、画面とPDFの行構成が必ず一致する。
function getWrappedLines(box) {
  const m = document.createElement('div');
  m.className = 'textbox measurebox';
  m.style.width = box.w + 'px';
  m.style.fontSize = box.fontSize + 'px';
  m.textContent = box.text;
  document.body.appendChild(m);
  try {
    const node = m.firstChild;
    if (!node) return [];
    const text = node.textContent;
    const range = document.createRange();
    const lines = [];
    let line = '';
    let lastTop = null;
    for (let i = 0; i < text.length; i++) {
      const ch = text[i];
      if (ch === '\n') { lines.push(line); line = ''; lastTop = null; continue; }
      range.setStart(node, i);
      range.setEnd(node, i + 1);
      const rect = range.getClientRects()[0];
      if (rect) {
        if (lastTop !== null && rect.top - lastTop > 1) { lines.push(line); line = ''; }
        lastTop = rect.top;
      }
      line += ch;
    }
    lines.push(line);
    return lines;
  } finally {
    m.remove();
  }
}

function hexToRgb01(hex) {
  const v = hex.replace('#', '');
  const r = parseInt(v.substring(0, 2), 16) / 255;
  const g = parseInt(v.substring(2, 4), 16) / 255;
  const b = parseInt(v.substring(4, 6), 16) / 255;
  return { r, g, b };
}

saveBtn.addEventListener('click', async () => {
  saveBtn.disabled = true;
  saveBtn.textContent = '保存中...';
  try {
    const { PDFDocument, rgb } = PDFLib;
    // 役所の様式PDFに多い「編集のみ制限」の暗号化は空パスワードで復号できる。
    // 閲覧パスワード付きPDFは開くときに入力されたパスワードを使い、それでも失敗したら再入力を促す
    let pdfLibDoc;
    while (true) {
      try {
        pdfLibDoc = await PDFDocument.load(originalBytes.slice(0), { password: pdfPassword });
        break;
      } catch (err) {
        if (err && (err.message === 'NEEDS PASSWORD' || err.message === 'Password incorrect')) {
          const input = prompt(
            err.message === 'Password incorrect'
              ? 'パスワードが違います。もう一度入力してください:'
              : 'このPDFはパスワードで保護されています。パスワードを入力してください:'
          );
          if (input === null) return; // キャンセル（finallyでボタンは元に戻る）
          pdfPassword = input;
        } else {
          throw err;
        }
      }
    }
    pdfLibDoc.registerFontkit(fontkit);

    const jpFontBytes = await getJpFontBytes();
    // subset: true は @pdf-lib/fontkit のバグで日本語グリフが欠けるため使用不可
    const jpFont = await pdfLibDoc.embedFont(jpFontBytes, { subset: false });
    const pages = pdfLibDoc.getPages();

    // 折り返し位置の計測前にWebフォントの読み込みを確実にしておく
    try { await document.fonts.load("16px 'MPLUS1p-PDF'"); } catch (_) {}

    for (const [pageNumStr, boxes] of Object.entries(pageBoxes)) {
      const pageNum = parseInt(pageNumStr, 10);
      const page = pages[pageNum - 1];
      const { height } = page.getSize();

      for (const box of boxes) {
        if (!box.text) continue;
        const { r, g, b } = hexToRgb01(box.color);
        const lineHeightPx = box.fontSize * LINE_HEIGHT;
        // 行ボックス先頭からベースラインまで = 半レディング + アセント（ブラウザと同じ計算）
        const firstBaselinePx = box.y + BOX_PAD_Y
          + (lineHeightPx - (FONT_ASCENT + FONT_DESCENT) * box.fontSize) / 2
          + FONT_ASCENT * box.fontSize;
        const lines = getWrappedLines(box);
        lines.forEach((line, i) => {
          if (!line) return;
          const baselinePx = firstBaselinePx + i * lineHeightPx;
          page.drawText(line, {
            x: (box.x + BOX_PAD_X) / RENDER_SCALE,
            y: height - baselinePx / RENDER_SCALE,
            size: box.fontSize / RENDER_SCALE,
            font: jpFont,
            color: rgb(r, g, b),
          });
        });
      }
    }

    const outBytes = await pdfLibDoc.save();
    const blob = new Blob([outBytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'edited.pdf';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  } catch (err) {
    alert('保存中にエラーが発生しました: ' + err.message);
    console.error(err);
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = 'PDFを保存';
  }
});
</script>
</body>
</html>
